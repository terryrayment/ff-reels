<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FF Reels</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #F7F6F3;
      color: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .logo span {
      font-size: 16px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.5px;
    }
    h1 { font-size: 18px; font-weight: 500; margin-bottom: 0.5rem; }
    p { font-size: 13px; color: #999; line-height: 1.5; }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #E8E7E3;
      border-top-color: #1A1A1A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1.5rem auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div>
    <div class="logo"><span>FF</span></div>
    <h1>Friends &amp; Family</h1>
    <p>Connecting to server&hellip;</p>
    <div class="spinner"></div>
  </div>
  <script>
    // Fallback — try to load the live server
    setTimeout(() => {
      window.location.href = 'https://reels.friendsandfamily.tv';
    }, 2000);
  </script>
</body>
</html>
